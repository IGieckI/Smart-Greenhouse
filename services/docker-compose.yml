services:

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER:-adminadmin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD:-adminadmin}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influx/import_on_startup.sh:/docker-entrypoint-initdb.d/import_on_startup.sh:ro
      - ./influx/cumulative_dump.csv:/docker-entrypoint-initdb.d/cumulative_dump.csv:ro
    restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      # QUESTE SONO FONDAMENTALI PER IL DATASOURCE.YML
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/exported_dashboards:/var/lib/grafana/dashboards/json:ro
      - ./grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/provisioning/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - influxdb
    restart: unless-stopped
    
  # Core Controller
  controller:
    build: ./controller
    container_name: controller
    ports:
      - "3001:3001"
    volumes:
      - ./controller:/app
      - /app/node_modules
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=iot_org
      - INFLUX_BUCKET=sensor_data
      - LEAF_TEMP_LABEL=leaf_temp
    depends_on:
      - influxdb
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio

  # Local MQTT Broker
  # Note: To use this in the system it is needed to set USE_LOCAL_BROKER in 
  # loraWANGateway/main/config.hpp and point to this machine's LAN IP 
  # so the gateway can reach it.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  # Data Ingestion Clients

  # lw-client: receives LoRa data forwarded by the gateway via MQTT
  lw-client:
    build: ./lw-client
    container_name: lw-client
    volumes:
      - ./lw-client:/app
    command: python client_mqtt.py
    environment:
      - CONTROLLER_URL=http://controller:3001/api/data
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=greenhouse/telemetry/live
    depends_on:
      - controller
      - mosquitto
    restart: unless-stopped

  # cw-client: receives data from a nearby Star via CoAP Observe.
  # The host machine must be connected to the GREENHOUSE_STAR WiFi AP
  # (192.168.4.1) for this container to reach the Star.
  cw-client:
    build: ./cw-client
    container_name: cw-client
    network_mode: host
    volumes:
      - ./cw-client:/app
    command: python client_coap.py
    environment:
      - CONTROLLER_URL=http://localhost:3001/api/data
      - STAR_COAP_URI=coap://192.168.4.1/telemetry
      - STAR_HTTP_BASE=http://192.168.4.1
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
    depends_on:
      - controller
    restart: unless-stopped

  # Machine Learning
  ml-trainer:
    build: ./ml_workspace/trainer_data
    container_name: ml-trainer
    shm_size: '2gb'
    ports:
      - "8001:8001" 
    volumes:
      - ./ml_workspace/trainer_data:/app/trainer
      - ./ml_workspace/shared_core:/app/shared_core
    # MODIFICA QUI: Entriamo in /app/trainer prima di lanciare uvicorn
    command: /bin/bash -c "cd /app/trainer && uvicorn trainer_api:app --host 0.0.0.0 --port 8001"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=iot_org
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      - influxdb
    
  ml-inference:
    build: ./ml_workspace/inference_data
    container_name: ml-inference
    ports:
      - "8000:8000"
    volumes:
      - ./ml_workspace/inference_data:/app/inference
      - ./ml_workspace/shared_core:/app/shared_core
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=iot_org
      - PYTHONPATH=/app
    depends_on:
      - ml-trainer

  # Telegram Bot
  tg-bot:
    build: ./tg-bot
    container_name: tg-bot
    volumes:
      - ./tg-bot:/app
    command: python bot.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_TOKEN}
      - INFERENCE_URL=http://ml-inference:8000
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=iot_org
    depends_on:
      - ml-inference

volumes:
  influxdb-data:
  grafana-data:
