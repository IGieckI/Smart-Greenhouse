services:

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "${INFLUX_PORT}:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}

      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET_RAW}
      - DOCKER_INFLUXDB_CAVEAUX_BUCKET=${INFLUX_BUCKET_CAVEAUX}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influx/import_on_startup.sh:/docker-entrypoint-initdb.d/import_on_startup.sh:ro
      - ./influx/cumulative_dump.csv:/docker-entrypoint-initdb.d/cumulative_dump.csv:ro
      - ./influx/caveaux.csv:/docker-entrypoint-initdb.d/caveaux.csv:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped



  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET_RAW}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/exported_dashboards:/var/lib/grafana/dashboards/json:ro
      - ./grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/provisioning/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped



  controller:
    build: ./controller
    container_name: controller
    ports:
      - "${CONTROLLER_PORT}:3001"
    volumes:
      - ./controller:/app
      - /app/node_modules
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET_RAW}
      - LEAF_TEMP_LABEL=${LEAF_TEMP_LABEL}
      - CONTROLLER_URL=http://controller:3001
    depends_on:
      influxdb:
        condition: service_healthy
    devices:
      - "/dev/snd:/dev/snd"
    group_add:
      - audio



  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "${MQTT_PORT}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped



  lw-client:
    build: ./lw-client
    container_name: lw-client
    volumes:
      - ./lw-client:/app
    command: python client_mqtt.py
    environment:
      - CONTROLLER_URL=http://controller:3001/api/data
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=greenhouse/telemetry/live
    depends_on:
      - controller
      - mosquitto
    restart: unless-stopped



  cw-client:
    build: ./cw-client
    container_name: cw-client
    network_mode: host
    volumes:
      - ./cw-client:/app
    command: python client_coap.py
    environment:
      - CONTROLLER_URL=http://localhost:3001/api/data
      - STAR_COAP_BASE=coap://192.168.4.1
      - STAR_COAP_URI=coap://192.168.4.1/telemetry
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
    depends_on:
      - controller
    restart: unless-stopped



  ml-trainer:
    build: ./ml_workspace/trainer_data
    container_name: ml-trainer
    shm_size: '2gb'
    ports:
      - "${ML_TRAINER_PORT}:8001" 
    volumes:
      - ./ml_workspace/trainer_data:/app/trainer
      - ./ml_workspace/shared_core:/app/shared_core
    command: /bin/bash -c "cd /app/trainer && uvicorn trainer_api:app --host 0.0.0.0 --port 8001"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 5s
      timeout: 2s
      retries: 5
  

  
  ml-inference:
    build: ./ml_workspace/inference_data
    container_name: ml-inference
    ports:
      - "${ML_INFERENCE_PORT}:8000"
    volumes:
      - ./ml_workspace/inference_data:/app/inference
      - ./ml_workspace/shared_core:/app/shared_core
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - PYTHONPATH=/app
    depends_on:
      influxdb:
        condition: service_healthy
      ml-trainer:
        condition: service_healthy

  tg-bot:
    build: ./tg-bot
    container_name: tg-bot
    volumes:
      - ./tg-bot:/app
    command: python bot.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_TOKEN}
      - INFERENCE_URL=http://ml-inference:8000
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - PYTHONUNBUFFERED=1
    depends_on:
      - ml-inference

volumes:
  influxdb-data:
  grafana-data:
